name: PHP Checks   #Название workflow (видно на GitHub)

 

on: 

  push: 

    branches: [ main, master ] 

  pull_request:   #Запускать при push и PR на main/master 

    branches: [ main, master ] 

 

jobs: 

  php-lint: 

    name: PHP Syntax Check 

    runs-on: ubuntu-latest   #Использовать виртуалку с Ubuntu 

 

    steps: 

      - name: Checkout code 

        uses: actions/checkout@v4   #Скачать код репозитория

 

      - name: Setup PHP 

        uses: shivammathur/setup-php@v2  #Установить PHP нужной версии  

        with: 

          php-version: '8.1' 

 

      - name: Check PHP syntax 

        run: | 

          find . -name '*.php' -not -path './vendor/*' \   #Выполнить команду lint для всех .php файлов 

            -exec php -l {} \; | grep -v 'No syntax errors' 

          if [ $? -eq 0 ]; then exit 1; fi 

          echo 'All PHP files passed syntax check!' D
