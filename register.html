<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Anime Shop — Авторизация</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617;
            --header-bg: rgba(2, 6, 23, 0.9);
            --card: #0b1224;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #ec4899;
            --accent: #22d3ee;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        header {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            background-image: url("https://avatars.mds.yandex.net/i?id=1beffcd575f532d33658c2fbc72b731cee5202a1-5231754-images-thumbs&n=13");
            background-size: cover;
            background-position: center;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            margin-left: 26px;
            text-decoration: none;
            color: var(--muted);
            font-weight: 500;
            position: relative;
            transition: 0.3s;
        }

        nav a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -6px;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--text);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* AUTH SECTION */
        .auth-section {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 100px 20px;
        }

        .auth-card {
            background: linear-gradient(180deg, #0b1224, #020617);
            border-radius: var(--radius);
            padding: 40px;
            width: 400px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transition: all 0.4s ease; /* Плавный переход для смены цвета */
        }

        /* ВЫДЕЛЕНИЕ ПРИ РЕГИСТРАЦИИ */
        .auth-card.register-mode {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
        }

        .switch {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }

        .switch span {
            cursor: pointer;
            font-weight: 600;
            color: var(--muted);
            transition: 0.3s;
        }

        .switch span.active {
            color: var(--text);
        }

        /* Подсветка текста переключателя */
        #registerBtn.active {
            color: var(--accent);
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
        }

        .auth-card h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: var(--radius);
            border: 1px solid rgba(255,255,255,0.05);
            background: #020617;
            color: var(--text);
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.2);
        }

        /* Фокус для полей регистрации */
        .register-mode input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(34, 211, 238, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius);
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            color: #020617;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(236,72,153,0.35);
        }

        .form {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .form.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo">Anime Shop</div>
        <nav>
            <a href="index.html">Главная</a>
            <a href="#">Фигурки</a>
            <a href="#">Одежда</a>
            <a href="#">Манга</a>
            <a href="auth.html">Вход</a>
        </nav>
    </div>
</header>

<section class="auth-section">
    <div class="auth-card" id="authCard">

        <div class="switch">
            <span id="loginBtn" class="active">Вход</span>
            <span id="registerBtn">Регистрация</span>
        </div>

        <!-- Вход -->
        <div id="loginForm" class="form active">
            <h2>Вход</h2>
            <form>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Пароль" required>
                <button type="submit">Войти</button>
            </form>
        </div>

        <!-- Регистрация -->
        <div id="registerForm" class="form">
            <h2 style="color: var(--accent);">Регистрация</h2>
            <form>
                <input type="text" placeholder="Имя пользователя" required>
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Пароль" required>
                <button type="submit" style="background: var(--accent);">Зарегистрироваться</button>
            </form>
        </div>

    </div>
</section>

<script>
    const loginBtn = document.getElementById("loginBtn");
    const registerBtn = document.getElementById("registerBtn");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const authCard = document.getElementById("authCard");

    loginBtn.onclick = () => {
        loginBtn.classList.add("active");
        registerBtn.classList.remove("active");
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
        
        // Убираем выделение регистрации
        authCard.classList.remove("register-mode");
    }

    registerBtn.onclick = () => {
        registerBtn.classList.add("active");
        loginBtn.classList.remove("active");
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
        
        // Добавляем выделение регистрации
        authCard.classList.add("register-mode");
    }
</script>

</body>
</html>
