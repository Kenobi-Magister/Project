<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Каталог товаров | Anime Shop</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #020617;
            --header-bg: rgba(2, 6, 23, 0.9);
            --card: #0b1224;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --primary: #ec4899;
            --accent: #22d3ee;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top, #0f172a, #020617);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 100;
        }

        .header-container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            text-transform: uppercase;
            background-image: url("https://i.pinimg.com/originals/6a/ea/59/6aea59802feb54977eab2eced2104b8f.jpg");
            background-size: cover;
            background-position: center;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            margin-left: 26px;
            text-decoration: none;
            color: var(--muted);
            font-weight: 500;
            position: relative;
            transition: 0.3s;
        }

        nav a:hover {
            color: var(--text);
        }

        main {
            max-width: 1200px;
            margin: auto;
            padding: 60px 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .filters {
            flex: 0 0 280px;
            background: rgba(11, 18, 36, 0.7);
            padding: 24px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            position: sticky;
            top: 100px;
        }

        .filters h3 {
            margin-bottom: 25px;
            font-size: 20px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters h3::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 10px var(--primary);
        }

        .filter-section {
            margin-bottom: 24px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-section:last-of-type {
            border-bottom: none;
        }

        .filter-section strong {
            display: block;
            margin-bottom: 12px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .filters label {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            font-size: 14px;
            color: var(--muted);
            transition: 0.2s;
        }

        .filters label:hover {
            color: var(--text);
        }

        .filters input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            margin-right: 12px;
            position: relative;
            cursor: pointer;
            transition: 0.3s;
        }

        .filters input[type="checkbox"]:checked {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.4);
        }

        .filters input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 12px;
            left: 4px;
            top: 0px;
        }

        .filters input[type="number"],
        .filters select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 14px;
            border-radius: 10px;
            color: white;
            margin-top: 8px;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .filters input[type="number"]:focus,
        .filters select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.2);
        }

        .btn-apply {
            width: 100%;
            margin-top: 10px;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .btn-apply:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.5);
            filter: brightness(1.1);
        }

        .cards {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 30px;
        }

        .card {
            background: linear-gradient(180deg, #0b1224, #020617);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: var(--primary);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        .card h4 {
            margin-bottom: 6px;
            font-size: 18px;
        }

        .card p {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.4;
        }

        .card .price {
            color: var(--primary);
            font-weight: 600;
            margin-top: auto;
            padding-top: 10px;
            font-size: 18px;
        }

        .card .rating {
            margin-top: 6px;
            color: #ffd700;
        }

        footer {
            padding: 30px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        @media (max-width: 800px) {
            main {
                flex-direction: column;
            }

            .filters {
                width: 100%;
                flex: none;
                position: static;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-container">
            <div class="logo">Anime Shop</div>
            <nav>
                <a href="C:\Users\denis\Desktop\сайт\Главная страница.html">Главная</a>
                <a href="#">Фигурки</a>
                <a href="#">Одежда</a>
                <a href="#">Манга</a>
            </nav>
        </div>
    </header>

    <main>
        <aside class="filters">
            <h3>Фильтры</h3>
            <div class="filter-section">
                <strong>Категория</strong>
                <label><input type="checkbox" value="Фигурки" class="category"> Фигурки</label>
                <label><input type="checkbox" value="Одежда" class="category"> Одежда</label>
                <label><input type="checkbox" value="Манга" class="category"> Манга</label>
            </div>
            <div class="filter-section">
                <strong>Цена</strong>
                <input type="number" id="minPrice" placeholder="От 0">
                <input type="number" id="maxPrice" placeholder="До 50000">
            </div>
            <div class="filter-section">
                <strong>Наличие</strong>
                <label><input type="checkbox" id="inStock"> В наличии</label>
            </div>
            <div class="filter-section">
                <strong>Сортировка</strong>
                <select id="sortSelect">
                    <option value="">По умолчанию</option>
                    <option value="priceAsc">Сначала дешевле</option>
                    <option value="priceDesc">Сначала дороже</option>
                </select>
            </div>
            <button onclick="applyFilters()" class="btn-apply">Применить фильтры</button>
        </aside>

        <section class="cards" id="productContainer"></section>
    </main>

    <footer>
        © 2026 AnimeShop. Все права защищены.
    </footer>

    <script>
        const products = [
            { name: "Фигурка Наруто", category: "Фигурки", price: 7500, rating: 5, stock: true, img: "https://avatars.mds.yandex.net/i?id=7a0982ec501d3717e94d3e0a354b5c829208cc7f-10024862-images-thumbs&n=13" },
            { name: "Худи Атака Титанов", category: "Одежда", price: 15000, rating: 4, stock: false, img: "https://avatars.mds.yandex.net/i?id=2947e23a9fa0220132eaf049c7942cfcea73392e-5875681-images-thumbs&n=13" },
            { name: "Манга One Piece", category: "Манга", price: 4500, rating: 5, stock: true, img: "https://cdn.azbooka.ru/cv/w1100/8951de7e-83af-46bc-a288-1f38d2459547.jpg" },
            { name: "Худи Evangelion", category: "Одежда", price: 25000, rating: 5, stock: true, img: "https://ir.ozone.ru/s3/multimedia-1-u/8085318258.jpg" },
            { name: "Манга Berserk", category: "Манга", price: 4250, rating: 5, stock: true, img: "https://content.img-gorod.ru/pim/products/images/1b/93/0199ab8e-805e-7bfc-93c8-4242b6bb1b93.jpg" }
        ];

        function displayProducts(list) {
            const container = document.getElementById('productContainer');
            container.innerHTML = '';
            list.forEach(p => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${p.img}" alt="${p.name}">
                        <h4>${p.name}</h4>
                        <p>${p.category}</p>
                        <p class="rating">⭐${p.rating}</p>
                        <p class="price">₸${p.price}</p>
                        <p style="font-size:12px; margin-top:5px;">${p.stock ? "✅ В наличии" : "❌ Нет в наличии"}</p>
                    </div>
                `;
            });
        }

        function applyFilters() {
            let filtered = [...products];
            const selectedCategories = Array.from(document.querySelectorAll('.category:checked')).map(c => c.value);
            if (selectedCategories.length) {
                filtered = filtered.filter(p => selectedCategories.includes(p.category));
            }
            const min = parseFloat(document.getElementById('minPrice').value) || 0;
            const max = parseFloat(document.getElementById('maxPrice').value) || Infinity;
            filtered = filtered.filter(p => p.price >= min && p.price <= max);
            if (document.getElementById('inStock').checked) {
                filtered = filtered.filter(p => p.stock);
            }
            const sortVal = document.getElementById('sortSelect').value;
            if (sortVal === "priceAsc") {
                filtered.sort((a, b) => a.price - b.price);
            } else if (sortVal === "priceDesc") {
                filtered.sort((a, b) => b.price - a.price);
            }
            displayProducts(filtered);
        }

        displayProducts(products);
    </script>
</body>

</html>
